<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root {
  --sky: #0EA5E9; --sky-dark: #0369A1; --sky-light: #E0F2FE; --sky-mid: #38BDF8;
  --brown: #92400E; --brown-dark: #78350F; --brown-light: #FEF3C7; --brown-mid: #B45309;
  --bg: #F8FAFC; --bg2: #FFFFFF; --bg3: #F1F5F9;
  --text: #0F172A; --text2: #475569; --text3: #94A3B8;
  --border: #E2E8F0; --border2: #CBD5E1;
  --success: #10B981; --danger: #EF4444; --warning: #F59E0B; --info: #3B82F6;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
  --shadow-md: 0 4px 16px rgba(0,0,0,.1), 0 1px 4px rgba(0,0,0,.06);
  font-family: 'DM Sans', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}

/* ── SIDEBAR ── */
#sidebar{width:240px;background:var(--text);min-height:100vh;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:.3s}
.logo-wrap{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;letter-spacing:-0.5px}
.logo-text span{color:var(--sky-mid)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
nav{flex:1;padding:16px 0}
.nav-section{padding:8px 20px 4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:500}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.6);cursor:pointer;transition:.2s;font-size:14px;border-left:3px solid transparent;margin:1px 0}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--sky-mid)}
.nav-item.active{color:#fff;background:rgba(14,165,233,.15);border-left-color:var(--sky-mid)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.lang-toggle{display:flex;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden}
.lang-btn{flex:1;padding:6px;text-align:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:.2s}
.lang-btn.active{background:var(--sky);color:#fff}

/* ── MAIN ── */
#main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px}
.topbar-actions{display:flex;gap:10px;align-items:center}
#content{flex:1;padding:28px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.2s;font-family:inherit}
.btn-primary{background:var(--sky);color:#fff}.btn-primary:hover{background:var(--sky-dark)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-brown{background:var(--brown);color:#fff}.btn-brown:hover{background:var(--brown-dark)}
.btn svg{width:14px;height:14px}

/* ── CARDS ── */
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
.metric-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
.metric-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:6px}
.metric-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.metric-delta{font-size:12px;margin-top:4px}
.delta-up{color:var(--success)}.delta-down{color:var(--danger)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--bg2)}
th{padding:12px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);font-weight:500}
td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3);cursor:pointer}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-paid{background:#D1FAE5;color:#065F46}
.badge-draft{background:#F1F5F9;color:#475569}
.badge-sent{background:#DBEAFE;color:#1E40AF}
.badge-overdue{background:#FEE2E2;color:#991B1B}
.badge-pending{background:#FEF3C7;color:#92400E}
.badge-vip{background:linear-gradient(135deg,var(--brown-light),#FDE68A);color:var(--brown-dark)}
.badge-active{background:#D1FAE5;color:#065F46}
.badge-inactive{background:#F1F5F9;color:#64748B}

/* ── FORMS ── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-control{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);transition:.2s;outline:none}
.form-control:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
select.form-control{cursor:pointer}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border-radius:var(--radius);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{color:var(--text);background:var(--bg3)}

/* ── INVOICE PREVIEW ── */
#invoice-preview{background:#fff;padding:0;font-family:'DM Sans',sans-serif;color:#1e293b}
.inv-classic .inv-header{background:var(--bg3);padding:40px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--sky)}
.inv-modern .inv-header{background:var(--sky);padding:40px;display:flex;justify-content:space-between;align-items:flex-start;color:#fff}
.inv-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:24px}
.inv-logo span{opacity:.7}
.inv-meta{text-align:right;font-size:13px}
.inv-body{padding:40px}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:32px}
.inv-party-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px}
.inv-party-name{font-weight:600;font-size:15px;margin-bottom:4px}
.inv-party-detail{font-size:13px;color:var(--text2);line-height:1.6}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);border-bottom:2px solid var(--border)}
.inv-table td{padding:12px;font-size:13px;border-bottom:1px solid var(--border)}
.inv-modern .inv-table tr:nth-child(even) td{background:#f0f9ff}
.inv-totals{display:flex;justify-content:flex-end}
.inv-totals-box{width:260px}
.inv-total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.inv-total-final{display:flex;justify-content:space-between;padding:10px 0;font-size:15px;font-weight:700;border-top:2px solid var(--sky)}
.inv-footer{background:var(--bg3);padding:20px 40px;font-size:11px;color:var(--text3);text-align:center;border-top:1px solid var(--border)}

/* ── WHATSAPP FLOAT ── */
#wa-float{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.4);z-index:999;transition:.3s}
#wa-float:hover{transform:scale(1.1)}
#wa-float svg{width:28px;height:28px;fill:#fff}

/* ── SEARCH BAR ── */
.search-bar{position:relative}
.search-bar input{padding-left:36px;min-width:220px}
.search-bar svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3)}

/* ── TEMPLATE CARDS ── */
.tpl-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.tpl-card{border:2px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.2s}
.tpl-card:hover{border-color:var(--sky-mid)}
.tpl-card.selected{border-color:var(--sky);background:var(--sky-light)}
.tpl-preview{height:80px;border-radius:6px;margin-bottom:10px;overflow:hidden}
.tpl-classic-preview{background:linear-gradient(180deg,#f1f5f9 40%,#fff 40%);border:1px solid var(--border)}
.tpl-modern-preview{background:linear-gradient(180deg,var(--sky) 40%,#fff 40%)}

/* ── CHART WRAPPER ── */
.chart-wrap{position:relative;height:220px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
.empty p{font-size:14px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #main{margin-left:0}
  .grid-4{grid-template-columns:1fr 1fr}
  .grid-2{grid-template-columns:1fr}
}

/* ── UTILS ── */
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mt-4{margin-top:16px}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:var(--text2)}
.font-bold{font-weight:700}.font-medium{font-weight:500}
.w-full{width:100%}
.hidden{display:none}
h2{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:6px}
h3{font-family:'Syne',sans-serif;font-weight:600;font-size:16px}
.sky{color:var(--sky)}.brown{color:var(--brown)}
</style>
</head>

function calcTotal(items) {
  const ht = items.reduce((s,i) => s + i.qty * i.price, 0);
  const vat = items.reduce((s,i) => s + i.qty * i.price * (i.vat/100), 0);
  return {ht, vat, ttc: ht + vat};
}

function formatMoney(n) {
  return new Intl.NumberFormat('fr-CM',{style:'currency',currency:'XAF',maximumFractionDigits:0}).format(n);
}

function formatDate(d) {
  return new Date(d).toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', {day:'2-digit',month:'short',year:'numeric'});
}

function statusBadge(s) {
  const map = {paid:'badge-paid',draft:'badge-draft',sent:'badge-sent',overdue:'badge-overdue',pending:'badge-pending',viewed:'badge-sent',cancelled:'badge-draft'};
  return `<span class="badge ${map[s]||'badge-draft'}">${t('status.'+s)||s}</span>`;
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navMap = {dashboard:0,invoices:1,quotes:2,customers:3,catalog:4,reports:5};
  const items = document.querySelectorAll('.nav-item');
  if (navMap[page] !== undefined) items[navMap[page]].classList.add('active');

  const pages = {
    dashboard: renderDashboard,
    invoices: () => renderInvoiceList('invoice'),
    quotes: () => renderInvoiceList('quote'),
    customers: renderCustomers,
    catalog: renderCatalog,
    reports: renderReports,
  };
  if (pages[page]) pages[page]();
}

function renderReports() {
  document.getElementById('topbar-title').textContent = t('reports.reports');
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-brown btn-sm" onclick="alert('Export PDF en cours...')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      ${t('reports.export')} PDF
    </button>
    <button class="btn btn-ghost btn-sm" onclick="alert('Export Excel en cours...')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      ${t('reports.export')} Excel
    </button>`;

  const paidInv = invoices.filter(i=>i.status==='paid');
  const totalPaid = paidInv.reduce((s,i)=>s+calcTotal(i.items).ttc,0);
  const totalPending = invoices.filter(i=>['sent','viewed'].includes(i.status)).reduce((s,i)=>s+calcTotal(i.items).ttc,0);

  document.getElementById('content').innerHTML = `
    <div class="grid-3 mb-6">
      <div class="metric-card">
        <div class="metric-label">CA Total encaissé</div>
        <div class="metric-value sky">${formatMoney(totalPaid)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">En attente de paiement</div>
        <div class="metric-value" style="color:var(--warning)">${formatMoney(totalPending)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Taux de conversion devis</div>
        <div class="metric-value" style="color:var(--success)">75%</div>
      </div>
    </div>
    <div class="card mb-6">
      <h3 class="mb-4">Évolution du CA — 2024</h3>
      <div class="chart-wrap"><canvas id="reportChart"></canvas></div>
    </div>
    <div class="card">
      <h3 class="mb-4">Récapitulatif par client</h3>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Client</th><th>Nb factures</th><th>Total HT</th><th>Total TTC</th><th>Statut principal</th>
          </tr></thead>
          <tbody>
            ${customers.map(c=>{
              const cInv = invoices.filter(i=>i.customer.id===c.id && i.type==='invoice');
              const tot = cInv.reduce((s,i)=>s+calcTotal(i.items).ttc,0);
              const ht = cInv.reduce((s,i)=>s+calcTotal(i.items).ht,0);
              return `<tr>
                <td class="font-medium">${c.name} <span class="text-muted text-xs">— ${c.company}</span></td>
                <td>${cInv.length}</td>
                <td>${formatMoney(ht)}</td>
                <td class="font-bold">${formatMoney(tot)}</td>
                <td><span class="badge badge-${c.status}">${t('customer.'+c.status)}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  setTimeout(()=>{
    const ctx = document.getElementById('reportChart');
    if(!ctx) return;
    if(chartInstance) chartInstance.destroy();
    const months = t('months');
    chartInstance = new Chart(ctx, {
      type:'line',
      data:{
        labels: months,
        datasets:[
          {label:'CA',data:[120000,185000,210000,168000,295000,320000,280000,410000,390000,485000,0,0],borderColor:'#0EA5E9',backgroundColor:'rgba(14,165,233,.08)',fill:true,tension:.4,borderWidth:2,pointRadius:4},
          {label:'Objectif',data:[200000,200000,200000,200000,200000,300000,300000,300000,400000,400000,400000,400000],borderColor:'#92400E',borderDash:[5,5],fill:false,tension:0,borderWidth:1.5,pointRadius:0}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:12}}}},scales:{y:{ticks:{callback:v=>formatMoney(v),font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},x:{grid:{display:false}}}}
    });
  }, 50);
}

      <div class="tpl-card selected" id="tpl-classic" onclick="selectTemplate('classic')">

        <div class="font-medium text-sm">${t('template.classic')}</div>
        <div class="text-xs text-muted">Logo + tableau + signature</div>
      </div>
      <div class="tpl-card" id="tpl-modern" onclick="selectTemplate('modern')">
        <div class="tpl-preview tpl-modern-preview"></div>
        <div class="font-medium text-sm">${t('template.modern')}</div>
        <div class="text-xs text-muted">En-tête coloré + QR code</div>
      </div>
    </div>
    <div class="grid-2 mb-4">
      <div class="form-group">
        <label class="form-label">${t('customer.name')}</label>
        <select class="form-control" id="inv-customer">
          ${customers.map(c=>`<option value="${c.id}">${c.name} — ${c.company}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">${t('invoice.dueDate')}</label>
        <input type="date" class="form-control" id="inv-due" value="${new Date(Date.now()+30*86400000).toISOString().split('T')[0]}"/>
      </div>
    </div>
    <div id="inv-lines">
      <div class="flex items-center justify-between mb-3">
        <label class="form-label" style="margin:0">Lignes de prestation</label>
        <button class="btn btn-ghost btn-sm" onclick="addInvLine()">+ Ajouter</button>
      </div>
      <div id="inv-lines-body">
        <div class="inv-line flex gap-2 mb-2" style="align-items:flex-end">
          <div style="flex:3"><input class="form-control" placeholder="${t('invoice.description')}" value="Développement web"/></div>
          <div style="flex:1"><input class="form-control" type="number" placeholder="Qté" value="1"/></div>
          <div style="flex:2"><input class="form-control" type="number" placeholder="Prix HT" value="150000"/></div>
          <div style="flex:1"><input class="form-control" type="number" placeholder="TVA%" value="20"/></div>
        </div>
      </div>
    </div>
    <div class="form-group mt-4">
      <label class="form-label">${t('invoice.notes')}</label>
      <textarea class="form-control" rows="2" placeholder="Notes optionnelles..."></textarea>
    </div>
  `;
  openModal(title, body, [
    {label: t('actions.save'), cls:'btn-primary', fn:`saveNewInvoice('${type}')`},
    {label: t('invoice.preview'), cls:'btn-ghost', fn:`alert('Aperçu en cours de génération...')`},
  ]);
}

let selectedTemplate = 'classic';
function selectTemplate(tpl) {
  selectedTemplate = tpl;
  document.getElementById('tpl-classic').classList.toggle('selected', tpl==='classic');
  document.getElementById('tpl-modern').classList.toggle('selected', tpl==='modern');
}

function addInvLine() {
  const container = document.getElementById('inv-lines-body');
  const div = document.createElement('div');
  div.className = 'inv-line flex gap-2 mb-2';
  div.style.alignItems = 'flex-end';
  div.innerHTML = `
    <div style="flex:3"><input class="form-control" placeholder="${t('invoice.description')}" /></div>
    <div style="flex:1"><input class="form-control" type="number" placeholder="Qté" value="1"/></div>
    <div style="flex:2"><input class="form-control" type="number" placeholder="Prix HT" value="0"/></div>
    <div style="flex:1"><input class="form-control" type="number" placeholder="TVA%" value="20"/></div>
    <button class="btn btn-ghost btn-sm" onclick="this.closest('.inv-line').remove()">✕</button>`;
  container.appendChild(div);
}

function saveNewInvoice(type) {
  alert(`${type === 'invoice' ? t('invoice.invoice') : t('invoice.quote')} créé(e) avec succès !`);
  closeModal();
  navigate(type === 'invoice' ? 'invoices' : 'quotes');
}

// ═══════════════════════════════════════
//  MODAL ENGINE
// ═══════════════════════════════════════
function openModal(title, body, actions=[]) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-ghost" onclick="closeModal()">${t('actions.cancel')}</button>
    ${actions.map(a=>`<button class="btn ${a.cls}" onclick="${a.fn}">${a.label}</button>`).join('')}
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModal(event) {
  if (event && event.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
}
