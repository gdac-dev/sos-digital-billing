<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --sky:#0EA5E9;--sky-dark:#0369A1;--sky-light:#E0F2FE;--sky-mid:#38BDF8;
  --brown:#92400E;--brown-dark:#78350F;--brown-light:#FEF3C7;--brown-mid:#B45309;
  --bg:#F8FAFC;--bg2:#FFFFFF;--bg3:#F1F5F9;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --border:#E2E8F0;--success:#10B981;--danger:#EF4444;--warning:#F59E0B;--info:#3B82F6;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
  font-family:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden}
#sidebar{width:240px;background:var(--text);min-height:100vh;display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100}
.logo-wrap{padding:20px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
nav{flex:1;padding:16px 0}
.nav-section{padding:8px 20px 4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:500}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.6);cursor:pointer;transition:.2s;font-size:14px;border-left:3px solid transparent;margin:1px 0}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.06);border-left-color:var(--sky-mid)}
.nav-item.active{color:#fff;background:rgba(14,165,233,.15);border-left-color:var(--sky-mid)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.8}
.sidebar-bottom{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.lang-toggle{display:flex;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden}
.lang-btn{flex:1;padding:6px;text-align:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:.2s}
.lang-btn.active{background:var(--sky);color:#fff}
#main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px}
.topbar-actions{display:flex;gap:10px;align-items:center}
#content{flex:1;padding:28px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:.2s;font-family:inherit}
.btn-primary{background:var(--sky);color:#fff}.btn-primary:hover{background:var(--sky-dark)}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--bg3)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-brown{background:var(--brown);color:#fff}.btn-brown:hover{background:var(--brown-dark)}
.btn svg{width:14px;height:14px}
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
.metric-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:20px;box-shadow:var(--shadow)}
.metric-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:6px}
.metric-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:700}
.metric-delta{font-size:12px;margin-top:4px}
.delta-up{color:var(--success)}.delta-down{color:var(--danger)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--bg2)}
th{padding:12px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);font-weight:500}
td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-paid{background:#D1FAE5;color:#065F46}
.badge-draft{background:#F1F5F9;color:#475569}
.badge-sent{background:#DBEAFE;color:#1E40AF}
.badge-overdue{background:#FEE2E2;color:#991B1B}
.badge-pending{background:#FEF3C7;color:#92400E}
.badge-viewed{background:#DBEAFE;color:#1E40AF}
.badge-cancelled{background:#F1F5F9;color:#64748B}
.badge-vip{background:#FDE68A;color:var(--brown-dark)}
.badge-active{background:#D1FAE5;color:#065F46}
.badge-inactive{background:#F1F5F9;color:#64748B}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.form-control{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;color:var(--text);background:var(--bg2);transition:.2s;outline:none}
.form-control:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(14,165,233,.15)}
select.form-control{cursor:pointer}
textarea.form-control{resize:vertical;min-height:80px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--bg2);border-radius:var(--radius);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-lg{max-width:900px}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:17px}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--bg2)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;display:flex;align-items:center}
.close-btn:hover{color:var(--text);background:var(--bg3)}
#invoice-preview-content{background:#fff;font-family:'DM Sans',sans-serif;color:#1e293b}
.inv-classic .inv-header{background:var(--bg3);padding:36px 40px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--sky)}
.inv-modern .inv-header{background:var(--sky);padding:36px 40px;display:flex;justify-content:space-between;align-items:flex-start;color:#fff}
.inv-body{padding:36px 40px}
.inv-parties{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:28px}
.inv-party-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px}
.inv-modern .inv-party-label-right{color:rgba(255,255,255,.7);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.inv-party-name{font-weight:600;font-size:15px;margin-bottom:4px}
.inv-party-detail{font-size:13px;color:var(--text2);line-height:1.6}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.inv-table th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);border-bottom:2px solid var(--border)}
.inv-table td{padding:12px;font-size:13px;border-bottom:1px solid var(--border)}
.inv-modern .inv-table tr:nth-child(even) td{background:#f0f9ff}
.inv-totals{display:flex;justify-content:flex-end;margin-bottom:24px}
.inv-totals-box{width:260px}
.inv-total-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.inv-total-final{display:flex;justify-content:space-between;padding:10px 0;font-size:15px;font-weight:700;border-top:2px solid var(--sky)}
.inv-footer-bar{background:var(--bg3);padding:16px 40px;font-size:11px;color:var(--text3);text-align:center;border-top:1px solid var(--border)}
#wa-float{position:fixed;bottom:24px;right:24px;width:52px;height:52px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,.4);z-index:999;transition:.3s}
#wa-float:hover{transform:scale(1.1)}
#wa-float svg{width:28px;height:28px;fill:#fff}
.hidden{display:none}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}.mt-4{margin-top:16px}.mt-3{margin-top:12px}
.text-sm{font-size:13px}.text-xs{font-size:11px}.text-muted{color:var(--text2)}
.font-bold{font-weight:700}.font-medium{font-weight:500}
.w-full{width:100%}
h2{font-family:'Syne',sans-serif;font-weight:700;font-size:20px;margin-bottom:6px}
h3{font-family:'Syne',sans-serif;font-weight:600;font-size:16px}
.sky{color:var(--sky)}.brown{color:var(--brown)}
.chart-wrap{position:relative;height:220px}
.tpl-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.tpl-card{border:2px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:.2s}
.tpl-card:hover{border-color:var(--sky-mid)}
.tpl-card.selected{border-color:var(--sky);background:var(--sky-light)}
.tpl-preview{height:70px;border-radius:6px;margin-bottom:10px;overflow:hidden}
.tpl-classic-preview{background:linear-gradient(180deg,#f1f5f9 40%,#fff 40%);border:1px solid var(--border)}
.tpl-modern-preview{background:linear-gradient(180deg,var(--sky) 40%,#fff 40%)}
.inv-line-row{display:grid;grid-template-columns:3fr 1fr 2fr 1fr auto;gap:8px;align-items:end;margin-bottom:8px}
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px}
.alert-success{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0}
.alert-error{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}
.toast{position:fixed;top:20px;right:20px;z-index:9999;padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;box-shadow:var(--shadow-md);animation:slideIn .3s ease}
.toast-success{background:#065F46;color:#fff}
.toast-error{background:#991B1B;color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty svg{width:48px;height:48px;margin-bottom:16px;opacity:.3}
.divider{height:1px;background:var(--border);margin:16px 0}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--sky-light);color:var(--sky-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.catalog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}.catalog-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){#sidebar{display:none}#main{margin-left:0}.grid-4,.grid-2,.grid-3,.catalog-grid{grid-template-columns:1fr}}
</style>
</head>

// ============================================================
// HELPERS
// ============================================================
function calcTotals(items){
  const ht = items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.price)||0),0);
  const vat = items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.price)||0)*((Number(i.vat)||0)/100),0);
  return {ht, vat, ttc: ht+vat};
}
function fmtMoney(n){ return new Intl.NumberFormat('fr-CM',{style:'currency',currency:'XAF',maximumFractionDigits:0}).format(n||0); }
function fmtDate(d){ if(!d) return '-'; return new Date(d).toLocaleDateString(lang==='fr'?'fr-FR':'en-US',{day:'2-digit',month:'short',year:'numeric'}); }
function statusBadge(s){ const m={paid:'badge-paid',draft:'badge-draft',sent:'badge-sent',overdue:'badge-overdue',viewed:'badge-viewed',cancelled:'badge-cancelled',pending:'badge-pending'}; return `<span class="badge ${m[s]||'badge-draft'}">${t('status.'+s)||s}</span>`; }
function custBadge(s){ return `<span class="badge badge-${s}">${t('cust.'+s)}</span>`; }
function getCustomer(id){ return DB.get('customers').find(c=>c.id==id)||{name:'—',company:'—',email:'',phone:'',address:''}; }
function nextRef(type){
  const year = new Date().getFullYear();
  const prefix = type==='invoice'?'INV':'DEV';
  const invs = DB.get('invoices').filter(i=>i.type===type);
  const n = invs.length+1;
  return `${prefix}-${year}-${String(n).padStart(3,'0')}`;
}
function toast(msg, type='success'){
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}
function confirm2(msg, cb){
  openModal(t('actions.confirm'), `<p style="font-size:15px;color:var(--text2)">${msg}</p>`,
    [{label:t('actions.delete'),cls:'btn-danger',fn:()=>{cb();closeModal();}}]);
}

            <button class="btn btn-ghost btn-sm" onclick="openDocModal(${inv.id},'${type}')" title="Modifier"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>

function updateStatus(id, status){
  const invs = DB.get('invoices');
  const idx = invs.findIndex(i=>i.id==id);
  if(idx<0) return;
  invs[idx].status = status;
  DB.set('invoices',invs);
  toast(t('toast.saved'));
}

function deleteDoc(id){
  confirm2(t('confirm.delete'),()=>{
    const invs = DB.get('invoices').filter(i=>i.id!=id);
    DB.set('invoices',invs);
    toast(t('toast.deleted'),'success');
    navigate(currentPage);
  });
}

function convertToInvoice(id){
  const invs = DB.get('invoices');
  const idx = invs.findIndex(i=>i.id==id);
  if(idx<0) return;
  const newInv = {...invs[idx], id:DB.nextId('invoices'), type:'invoice', ref:nextRef('invoice'), status:'draft', createdAt:Date.now()};
  invs.push(newInv);
  DB.set('invoices',invs);
  toast(t('toast.converted'));
  navigate('invoices');
}

function addDocLine(){ docLines.push({desc:'',qty:1,price:0,vat:20}); renderDocLines(); }

function addFromCatalog(catId){
  if(!catId) return;
  const item = DB.get('catalog').find(c=>c.id==catId);
  if(!item) return;
  docLines.push({desc:item.name,qty:1,price:item.price,vat:20});
  renderDocLines();
}

function removeDocLine(idx){ docLines.splice(idx,1); renderDocLines(); }

function updateDocLine(idx,field,val){
  docLines[idx][field] = field==='desc'?val:Number(val)||0;
  renderDocLines();
}

function renderDocLines(){
  const el = document.getElementById('doc-lines');
  if(!el) return;
  el.innerHTML = docLines.map((line,i)=>`
    <div class="inv-line-row">
      <input class="form-control" placeholder="${t('inv.description')}" value="${line.desc}" oninput="updateDocLine(${i},'desc',this.value)"/>
      <input class="form-control" type="number" min="1" placeholder="Qté" value="${line.qty}" oninput="updateDocLine(${i},'qty',this.value)"/>
      <input class="form-control" type="number" min="0" placeholder="Prix HT" value="${line.price}" oninput="updateDocLine(${i},'price',this.value)"/>
      <input class="form-control" type="number" min="0" max="100" placeholder="TVA%" value="${line.vat}" oninput="updateDocLine(${i},'vat',this.value)"/>
      <button class="btn btn-ghost btn-sm" onclick="removeDocLine(${i})" style="color:var(--danger);padding:8px">✕</button>
    </div>`).join('');
  const tot = calcTotals(docLines);
  const totEl = document.getElementById('doc-total');
  if(totEl) totEl.innerHTML = `<div style="display:flex;justify-content:flex-end"><div style="width:260px;background:var(--bg3);border-radius:var(--radius-sm);padding:12px">

    <div class="flex justify-between text-sm mb-2"><span>${t('inv.vatAmount')}</span><span class="font-medium">${fmtMoney(tot.vat)}</span></div>
    <div class="flex justify-between font-bold" style="border-top:2px solid var(--sky);padding-top:8px;margin-top:8px"><span>${t('inv.totalIncTax')}</span><span class="sky">${fmtMoney(tot.ttc)}</span></div>
  </div></div>`;

function saveDoc(type, previewAfter=false){
  const custId = document.getElementById('doc-customer')?.value;
  const date = document.getElementById('doc-date')?.value;
  const due = document.getElementById('doc-due')?.value;
  const status = document.getElementById('doc-status')?.value;
  const notes = document.getElementById('doc-notes')?.value||'';;
  const terms = document.getElementById('doc-terms')?.value||'';
  if(!custId){ toast('Veuillez choisir un client','error'); return; }
  if(!date||!due){ toast('Dates obligatoires','error'); return; }
  if(docLines.length===0){ toast('Ajoutez au moins une ligne','error'); return; }
  const validLines = docLines.filter(l=>l.desc.trim());
  if(validLines.length===0){ toast('Remplissez la désignation des lignes','error'); return; }
  const invs = DB.get('invoices');
  if(editingId){
    const idx = invs.findIndex(i=>i.id==editingId);
    if(idx>=0){ invs[idx]={...invs[idx],customerId:Number(custId),date,due,status,notes,terms,template:docTemplate,items:validLines}; }
    DB.set('invoices',invs);
  } else {
    const newDoc={id:DB.nextId('invoices'),ref:nextRef(type),type,customerId:Number(custId),date,due,status,notes,terms,template:docTemplate,items:validLines,createdAt:Date.now()};
    invs.push(newDoc);
    DB.set('invoices',invs);
    editingId = newDoc.id;
  }
  toast(t('toast.saved'));
  if(previewAfter){ closeModal(); const saved=DB.get('invoices').find(i=>i.id==editingId); if(saved) openPreview(saved.id); }
  else { closeModal(); navigate(currentPage); }
}

      <div class="metric-card"><div class="metric-label">CA Total encaissé</div><div class="metric-value sky">${fmtMoney(totalPaid)}</div></div>
      <div class="metric-card"><div class="metric-label">En attente de paiement</div><div class="metric-value" style="color:var(--warning)">${fmtMoney(totalPending)}</div></div>
      <div class="metric-card"><div class="metric-label">Taux conversion devis</div><div class="metric-value" style="color:var(--success)">${convRate}%</div></div>
    </div>
    <div class="card mb-6">
      <h3 class="mb-4">Évolution du CA — ${new Date().getFullYear()}</h3>
      <div class="chart-wrap"><canvas id="reportChart"></canvas></div>
    </div>
    <div class="card">
      <h3 class="mb-4">Récapitulatif par client</h3>
      <div class="table-wrap"><table><thead><tr><th>Client</th><th>Nb factures</th><th>Total HT</th><th>Total TTC</th><th>Statut</th></tr></thead><tbody>
        ${custs.map(c=>{
          const cInvs=invs.filter(i=>i.customerId==c.id);
          const ht=cInvs.reduce((s,i)=>s+calcTotals(i.items).ht,0);
          const ttc=cInvs.reduce((s,i)=>s+calcTotals(i.items).ttc,0);
          return `<tr><td class="font-medium">${c.name} <span class="text-muted text-xs">— ${c.company}</span></td><td>${cInvs.length}</td><td>${fmtMoney(ht)}</td><td class="font-bold">${fmtMoney(ttc)}</td><td>${custBadge(c.status)}</td></tr>`;
        }).join('')}
      </tbody></table></div>
    </div>`;
  setTimeout(()=>{
    const ctx=document.getElementById('reportChart');
    if(!ctx) return;
    if(chartInst) chartInst.destroy();
    const months=t('months');
    const yr=new Date().getFullYear();
    const data=months.map((_,mi)=>paid.filter(i=>{ const d=new Date(i.date); return d.getMonth()===mi&&d.getFullYear()===yr; }).reduce((s,i)=>s+calcTotals(i.items).ttc,0));
    chartInst=new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:t('dash.revenue'),data,borderColor:'#0EA5E9',backgroundColor:'rgba(14,165,233,.08)',fill:true,tension:.4,borderWidth:2,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fmtMoney(v),font:{size:10}},grid:{color:'rgba(0,0,0,.04)'}},x:{grid:{display:false}}}}});
  },50);
}

// MODAL ENGINE

function openModal(title, body, actions=[], extraCls=''){ 
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn btn-ghost" onclick="closeModal()">${t('actions.cancel')}</button>
    ${actions.map(a=>`<button class="btn ${a.cls}" onclick="${typeof a.fn==='string'?a.fn:''}" ${typeof a.fn==='function'?`id="modal-btn-${Math.random().toString(36).slice(2)}"`:''} >${a.label}</button>`).join('')}`;
  document.getElementById('modal-box').className=`modal ${extraCls}`;
  document.getElementById('modal-overlay').classList.remove('hidden');
  // Bind function actions
  actions.forEach((a,i)=>{ if(typeof a.fn==='function'){ const btns=document.getElementById('modal-footer').querySelectorAll('.btn'); btns[i+1].onclick=a.fn; } });
}

function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); editingId=null; docLines=[]; }
document.getElementById('modal-overlay').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
